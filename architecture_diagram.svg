<svg width="100%" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif">
<title>VectorCam system architecture from capture to prediction</title>
<desc>A field officer photographs a specimen on a phone. On the phone the image is cropped, classified, and passed through a confidence gate. Confident results are logged automatically; uncertain results go to a human expert whose corrections feed back to training.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>.t{font-size:14px;font-weight:600}.ts{font-size:11.5px}.h{font-size:14px;font-weight:600}</style>
<rect x="0" y="0" width="680" height="600" fill="#ffffff"/>
<text class="h" x="40" y="26" fill="#444441">Build phase — offline, one time</text>
<rect x="40" y="38" width="600" height="96" rx="12" fill="none" stroke="#888780" stroke-width="0.6" stroke-dasharray="4 4"/>
<rect x="58" y="64" width="150" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="t" x="133" y="86" text-anchor="middle" fill="#2C2C2A">Clean + split data</text><text class="ts" x="133" y="103" text-anchor="middle" fill="#5F5E5A">grouped by specimen</text>
<rect x="262" y="64" width="150" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t" x="337" y="86" text-anchor="middle" fill="#085041">U2Net crop</text><text class="ts" x="337" y="103" text-anchor="middle" fill="#0F6E56">remove tray + label</text>
<rect x="466" y="64" width="156" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="t" x="544" y="86" text-anchor="middle" fill="#3C3489">Train + evaluate</text><text class="ts" x="544" y="103" text-anchor="middle" fill="#534AB7">EfficientViT-B0</text>
<line x1="208" y1="90" x2="260" y2="90" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="412" y1="90" x2="464" y2="90" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="h" x="40" y="172" fill="#085041">Field use — on the phone, fully offline</text>
<rect x="40" y="184" width="600" height="130" rx="12" fill="none" stroke="#0F6E56" stroke-width="0.6" stroke-dasharray="4 4"/>
<rect x="58" y="216" width="128" height="66" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="122" y="233" text-anchor="middle" fill="#993C1D">Field officer</text><text class="t" x="122" y="251" text-anchor="middle" fill="#712B13">Capture photo</text><text class="ts" x="122" y="268" text-anchor="middle" fill="#993C1D">person + phone</text>
<rect x="214" y="223" width="120" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t" x="274" y="245" text-anchor="middle" fill="#085041">Crop</text><text class="ts" x="274" y="262" text-anchor="middle" fill="#0F6E56">u2netp ~5MB</text>
<rect x="362" y="223" width="120" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="t" x="422" y="245" text-anchor="middle" fill="#3C3489">Classify</text><text class="ts" x="422" y="262" text-anchor="middle" fill="#534AB7">ONNX · ~6ms</text>
<rect x="510" y="223" width="112" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="t" x="566" y="245" text-anchor="middle" fill="#633806">Confidence</text><text class="ts" x="566" y="262" text-anchor="middle" fill="#633806">gate</text>
<line x1="186" y1="249" x2="212" y2="249" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="334" y1="249" x2="360" y2="249" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="482" y1="249" x2="508" y2="249" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="544" y1="116" x2="544" y2="150" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text class="ts" x="544" y="142" text-anchor="middle" fill="#5F5E5A">deployed model</text>
<text class="h" x="40" y="356" fill="#712B13">Decision — where a person enters the loop</text>
<rect x="40" y="368" width="600" height="170" rx="12" fill="none" stroke="#993C1D" stroke-width="0.6" stroke-dasharray="4 4"/>
<rect x="80" y="410" width="220" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t" x="190" y="431" text-anchor="middle" fill="#085041">Confident → auto-log</text><text class="ts" x="190" y="450" text-anchor="middle" fill="#0F6E56">species recorded to survey,</text><text class="ts" x="190" y="464" text-anchor="middle" fill="#0F6E56">no person needed</text>
<rect x="380" y="410" width="220" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="t" x="490" y="431" text-anchor="middle" fill="#712B13">Uncertain → expert review</text><text class="ts" x="490" y="450" text-anchor="middle" fill="#993C1D">entomologist confirms species</text><text class="ts" x="490" y="464" text-anchor="middle" fill="#993C1D">(human in the loop)</text>
<path d="M550 275 L550 330 L190 330 L190 408" fill="none" stroke="#5F5E5A" stroke-width="1.3" marker-end="url(#arrow)"/>
<text class="ts" x="300" y="323" text-anchor="middle" fill="#5F5E5A">confident</text>
<path d="M582 275 L582 330 L490 330 L490 408" fill="none" stroke="#5F5E5A" stroke-width="1.3" marker-end="url(#arrow)"/>
<text class="ts" x="545" y="323" text-anchor="middle" fill="#5F5E5A">uncertain</text>
<rect x="380" y="486" width="220" height="34" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="490" y="506" text-anchor="middle" fill="#3C3489">corrections feed back to training</text>
<path d="M490 486 L490 478" fill="none" stroke="#534AB7" stroke-width="1.3" marker-end="url(#arrow)"/>
</svg>
