<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif">
<title>VectorCam full system architecture</title>
<desc>Raw data drops are cleaned and split by specimen, cropped with U2Net, and used to train a classifier. Two evaluation paths test unseen devices and Kenya field data. The deployed model runs on-device on a phone with a confidence gate routing uncertain cases to expert review.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>.t{font-size:14px;font-weight:600}.ts{font-size:12px}</style>
<text class="t" x="40" y="28" fill="#444441">Data + training</text>
<rect x="40" y="40" width="600" height="150" rx="14" fill="none" stroke="#888780" stroke-width="0.7" stroke-dasharray="5 4"/>
<!-- row 1 -->
<rect x="58" y="70" width="128" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="t" x="122" y="92" text-anchor="middle" fill="#2C2C2A">4 data drops</text><text class="ts" x="122" y="109" text-anchor="middle" fill="#5F5E5A">insectary + Kenya</text>
<rect x="236" y="70" width="128" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="t" x="300" y="92" text-anchor="middle" fill="#2C2C2A">Clean + split</text><text class="ts" x="300" y="109" text-anchor="middle" fill="#5F5E5A">grouped by specimen</text>
<rect x="414" y="70" width="120" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t" x="474" y="92" text-anchor="middle" fill="#085041">U2Net crop</text><text class="ts" x="474" y="109" text-anchor="middle" fill="#0F6E56">remove tray</text>
<rect x="558" y="70" width="66" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="591" y="90" text-anchor="middle" fill="#3C3489">Train</text><text class="ts" x="591" y="107" text-anchor="middle" fill="#534AB7">EffViT-B0</text>
<line x1="186" y1="96" x2="234" y2="96" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="364" y1="96" x2="412" y2="96" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="534" y1="96" x2="556" y2="96" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- eval paths -->
<rect x="120" y="146" width="180" height="30" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="210" y="165" text-anchor="middle" fill="#0C447C">Test A: unseen device → 0.92</text>
<rect x="330" y="146" width="200" height="30" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="430" y="165" text-anchor="middle" fill="#633806">Test B: Kenya field → 0.65</text>
<path d="M591 122 L591 133 L210 133 L210 144" fill="none" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M591 133 L430 133 L430 144" fill="none" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- deployment -->
<text class="t" x="40" y="228" fill="#085041">Deployment (on-device, offline)</text>
<rect x="40" y="240" width="600" height="140" rx="14" fill="none" stroke="#0F6E56" stroke-width="0.7" stroke-dasharray="5 4"/>
<rect x="58" y="284" width="120" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="t" x="118" y="306" text-anchor="middle" fill="#2C2C2A">Capture</text><text class="ts" x="118" y="323" text-anchor="middle" fill="#5F5E5A">phone photo</text>
<rect x="228" y="284" width="120" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t" x="288" y="306" text-anchor="middle" fill="#085041">Crop</text><text class="ts" x="288" y="323" text-anchor="middle" fill="#0F6E56">u2netp ~5MB</text>
<rect x="398" y="284" width="120" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="t" x="458" y="306" text-anchor="middle" fill="#3C3489">Classify</text><text class="ts" x="458" y="323" text-anchor="middle" fill="#534AB7">ONNX, ~6ms</text>
<rect x="540" y="284" width="84" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="582" y="306" text-anchor="middle" fill="#633806">Confidence</text><text class="ts" x="582" y="323" text-anchor="middle" fill="#633806">gate</text>
<line x1="178" y1="310" x2="226" y2="310" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="348" y1="310" x2="396" y2="310" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="518" y1="310" x2="538" y2="310" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="474" y1="176" x2="474" y2="238" stroke="#888780" stroke-width="0.7" stroke-dasharray="3 3"/>
<!-- human loop -->
<rect x="120" y="410" width="200" height="46" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t" x="220" y="428" text-anchor="middle" fill="#085041">Accept + log</text><text class="ts" x="220" y="445" text-anchor="middle" fill="#0F6E56">confident → survey record</text>
<rect x="360" y="410" width="200" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="t" x="460" y="428" text-anchor="middle" fill="#712B13">Expert review</text><text class="ts" x="460" y="445" text-anchor="middle" fill="#993C1D">uncertain → human decides</text>
<path d="M560 336 L560 392 L220 392 L220 408" fill="none" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="300" y="386" text-anchor="middle" fill="#5F5E5A">confident</text>
<path d="M582 336 L582 392 L460 392 L460 408" fill="none" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="520" y="386" text-anchor="middle" fill="#5F5E5A">uncertain</text>
<text class="t" x="360" y="404" fill="#712B13">Human in the loop</text>
</svg>
